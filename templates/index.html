<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>scp-helper</title>
  <style>
    :root {
      --bg: #0c0c0c;
      --card-bg: #1a1a1a;
      --card-border: #2a2a2a;
      --orange: #ff9000;
      --orange-hover: #e68200;
      --orange-soft: rgba(255, 144, 0, 0.12);
      --text: #fff;
      --muted: #999;
      --danger: #e74c3c;
      --success: #2ecc71;
      --radius: 4px;
      --radius-lg: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      background: #000;
      border-bottom: 1px solid #222;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .logo span {
      display: inline-block;
      background: var(--orange);
      color: #000;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      margin-right: 2px;
    }

    .topbar input {
      flex: none;
      border: none;
      background: #1a1a1a;
      color: var(--text);
      padding: 0.45rem 0.75rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }

    .topbar input:focus {
      box-shadow: 0 0 0 2px var(--orange);
    }

    .topbar input::placeholder { color: #666; }

    .at { color: #666; font-weight: 600; user-select: none; }

    .btn {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-size: 0.825rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.45rem 1rem;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-orange {
      background: var(--orange);
      color: #000;
    }

    .btn-orange:hover { background: var(--orange-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid #333;
    }

    .btn-ghost:hover { color: #fff; border-color: #555; }

    .status-pill {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #666;
      margin-left: auto;
    }

    .status-pill.on {
      color: var(--success);
    }

    /* ── Main grid ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1rem;
      max-width: 1300px;
      margin: 0 auto;
    }

    @media (max-width: 800px) {
      .main-grid { grid-template-columns: 1fr; }
      .topbar { flex-wrap: wrap; }
    }

    /* ── Cards ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      background: #141414;
      border-bottom: 1px solid var(--card-border);
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .card-body {
      padding: 0.5rem;
      max-height: 55vh;
      overflow-y: auto;
    }

    /* ── Path bar ── */
    .path-bar {
      display: flex;
      gap: 0.35rem;
      padding: 0.4rem;
    }

    .path-bar input {
      flex: 1;
      border: 1px solid #222;
      background: #0c0c0c;
      color: var(--text);
      padding: 0.4rem 0.6rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      outline: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .path-bar input:focus { border-color: var(--orange); }
    .path-bar input::placeholder { color: #555; }

    .btn-sm {
      font-size: 0.7rem;
      padding: 0.35rem 0.7rem;
      border-radius: var(--radius);
      cursor: pointer;
      border: none;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: #222;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }

    .btn-sm:hover { background: #333; color: #fff; }

    /* ── File list ── */
    .file-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .file-table th {
      text-align: left;
      padding: 0.35rem 0.5rem;
      color: #555;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #1f1f1f;
    }

    .file-table td {
      padding: 0.3rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .file-name {
      cursor: pointer;
      border-radius: 3px;
      transition: color 0.1s;
      word-break: break-all;
    }

    .file-name:hover { color: var(--orange); }

    .col-btn { width: 2.2rem; text-align: center; }

    .mini-btn {
      cursor: pointer;
      border: none;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--orange);
      color: #000;
      transition: background 0.15s;
    }

    .mini-btn:hover { background: var(--orange-hover); }

    /* ── Drop zone ── */
    .drop-zone {
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .drop-zone-active {
      border-color: var(--orange) !important;
      box-shadow: inset 0 0 0 2px var(--orange) !important;
    }

    /* ── Log footer ── */
    .log-console {
      grid-column: 1 / -1;
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      border-radius: var(--radius-lg);
      padding: 0.65rem 1rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      color: var(--muted);
      min-height: 3rem;
      white-space: pre-wrap;
    }

    .log-console.error { color: var(--danger); }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      background: #222;
      color: var(--muted);
      margin-left: 0.35rem;
    }

    .badge.dir { color: var(--orange); background: rgba(255,144,0,0.1); }
  </style>
</head>
<body>

  <!-- ── Top bar ── -->
  <div class="topbar">
    <div class="logo"><span>SCP</span>HELPER</div>
    <input id="user" placeholder="Username" size="10">
    <span class="at">@</span>
    <input id="host" placeholder="Hostname or IP" size="16">
    <input id="password" type="password" placeholder="Password" size="12">
    <input id="remotePath" placeholder="Remote path" value="~" size="14">
    <button class="btn btn-orange" onclick="connect()">Connect</button>
    <span class="status-pill" id="connStatus"></span>
  </div>

  <!-- ── Main grid ── -->
  <div class="main-grid">

    <!-- Local -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">💻 Local</span>
      </div>
      <div class="path-bar">
        <input id="localPath" value="~" placeholder="Local path">
        <button class="btn-sm" onclick="loadLocal()">Browse</button>
      </div>
      <div class="card-body">
        <table class="file-table">
          <thead><tr><th>Name</th><th class="col-btn">→</th></tr></thead>
          <tbody id="localList"></tbody>
        </table>
      </div>
    </div>

    <!-- Remote (drop target) -->
    <div class="card drop-zone" id="remoteCard">
      <div class="card-header">
        <span class="card-title">🌐 Remote</span>
        <span class="badge" style="font-size:0.62rem">Drop files here</span>
      </div>
      <div class="path-bar">
        <input id="remotePanePath" value="~" placeholder="Remote path">
        <button class="btn-sm" onclick="loadRemote()">Browse</button>
      </div>
      <div class="card-body">
        <table class="file-table">
          <thead><tr><th class="col-btn">←</th><th>Name</th></tr></thead>
          <tbody id="remoteList"></tbody>
        </table>
      </div>
    </div>

    <!-- Log -->
    <div class="log-console" id="log"></div>
  </div>

  <script>
    function log(msg, isError) {
      const el = document.getElementById('log');
      const t = new Date().toLocaleTimeString('en-US', { hour12: false });
      const prefix = isError ? `[${t}] ✗ ` : `[${t}] `;
      el.textContent = prefix + msg;
      el.className = isError ? 'log-console error' : 'log-console';
    }

    async function postJson(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    async function connect() {
      try {
        await postJson('/api/connect', {
          user: document.getElementById('user').value,
          host: document.getElementById('host').value,
          password: document.getElementById('password').value,
          remote_path: document.getElementById('remotePath').value,
        });
        const s = document.getElementById('connStatus');
        s.textContent = '● Connected';
        s.className = 'status-pill on';
        document.getElementById('remotePanePath').value = document.getElementById('remotePath').value;
        await Promise.all([loadLocal(), loadRemote()]);
        log('Connected');
      } catch (e) {
        const s = document.getElementById('connStatus');
        s.textContent = '';
        s.className = 'status-pill';
        log(e.message, true);
      }
    }

    async function loadLocal() {
      const path = document.getElementById('localPath').value;
      const res = await fetch('/api/local/list?path=' + encodeURIComponent(path));
      const data = await res.json();
      if (!res.ok) return log(data.error || 'local list failed', true);
      document.getElementById('localPath').value = data.path;
      renderList('localList', data.items, 'local');
    }

    async function loadRemote() {
      const path = document.getElementById('remotePanePath').value;
      const data = await postJson('/api/remote/list', { path });
      document.getElementById('remotePanePath').value = data.path;
      renderList('remoteList', data.items, 'remote');
    }

    function renderList(tbodyId, items, side) {
      const tbody = document.getElementById(tbodyId);
      tbody.innerHTML = '';
      for (const item of items) {
        const tr = document.createElement('tr');
        const isDir = item.type === 'dir';

        const nameCell = document.createElement('td');
        const icon = isDir ? '📁 ' : '📄 ';
        nameCell.innerHTML = icon + item.name + (isDir ? '<span class="badge dir">dir</span>' : '');
        nameCell.className = 'file-name';
        nameCell.onclick = () => {
          const inputId = side === 'local' ? 'localPath' : 'remotePanePath';
          const input = document.getElementById(inputId);
          const sep = input.value.endsWith('/') ? '' : '/';
          input.value = input.value + sep + item.name;
          side === 'local' ? loadLocal() : loadRemote();
        };

        const arrowCell = document.createElement('td');
        arrowCell.className = 'col-btn';
        const btn = document.createElement('button');
        btn.className = 'mini-btn';
        btn.textContent = side === 'local' ? '→' : '←';
        btn.title = side === 'local' ? 'Upload' : 'Download';
        btn.onclick = e => { e.stopPropagation(); transfer(side, item.name); };
        arrowCell.appendChild(btn);

        if (side === 'local') {
          tr.appendChild(nameCell);
          tr.appendChild(arrowCell);
        } else {
          tr.appendChild(arrowCell);
          tr.appendChild(nameCell);
        }
        tbody.appendChild(tr);
      }
    }

    async function transfer(side, name) {
      const localDir = document.getElementById('localPath').value;
      const remoteDir = document.getElementById('remotePanePath').value;
      try {
        await postJson('/api/transfer', {
          direction: side === 'local' ? 'local_to_remote' : 'remote_to_local',
          source_dir: side === 'local' ? localDir : remoteDir,
          target_dir: side === 'local' ? remoteDir : localDir,
          name,
        });
        log((side === 'local' ? '↑ ' : '↓ ') + name);
        await Promise.all([loadLocal(), loadRemote()]);
      } catch (e) {
        log(e.message, true);
      }
    }

    async function uploadFile(file, targetDir) {
      const form = new FormData();
      form.append('file', file);
      form.append('target_dir', targetDir);
      const res = await fetch('/api/upload', { method: 'POST', body: form });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    // ── Drop zone ──
    const remoteCard = document.getElementById('remoteCard');
    remoteCard.addEventListener('dragover', e => {
      e.preventDefault();
      remoteCard.classList.add('drop-zone-active');
    });
    remoteCard.addEventListener('dragleave', () => {
      remoteCard.classList.remove('drop-zone-active');
    });
    remoteCard.addEventListener('drop', async e => {
      e.preventDefault();
      remoteCard.classList.remove('drop-zone-active');
      const files = e.dataTransfer.files;
      if (!files.length) return;
      const targetDir = document.getElementById('remotePanePath').value;
      log(`Uploading ${files.length} file(s)...`);
      for (const file of files) {
        try {
          await uploadFile(file, targetDir);
          log(`↑ ${file.name}`);
        } catch (err) {
          log(`✗ ${file.name}: ${err.message}`, true);
        }
      }
      loadRemote();
    });
  </script>
</body>
</html>
